# ID: yaml-beans-and-java-relations
# ENABLED: true
# DESCRIPTION: Demonstrates dependency relationships between YAML beans and local Java class structures
# AUTHOR: Camel Studio

- beans:
    - name: dbHelper
      type: com.example.DatabaseHelper
      properties:
        jdbcUrl: "jdbc:postgresql://localhost:5432/orders"
    - name: myProcessor
      type: com.example.OrderProcessorBean
      properties:
        databaseHelper: "#dbHelper"
        environmentName: "PRODUCTION"

- route:
    id: yaml-bean-relation-route
    from:
      uri: timer:relation-test?period=5000&repeatCount=3
      steps:
        - setBody:
            constant: "Order-ID-9923"
        - bean:
            ref: myProcessor
            method: processOrder
        - log:
            message: "Response: ${body}"
