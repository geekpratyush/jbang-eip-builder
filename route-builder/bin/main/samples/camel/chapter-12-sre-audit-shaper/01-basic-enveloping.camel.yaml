# STEP 1: Basic Enveloping
# Goal: Standardize metadata without changing the payload.
# camel-k: dependency=mvn:com.sre.engine:sre-audit-crypto:1.0.0-SNAPSHOT

- beans:
    - name: "auditShaper"
      type: "com.sre.engine.audit.AuditShaperProcessor"

- route:
    id: "01-basic-enveloping"
    from:
      uri: "timer:step1?repeatCount=1"
      steps:
        - setBody:
            constant: '{"event": "system_startup", "status": "OK"}'
        - process:
            ref: "auditShaper"
        - log: "STEP 1 RESULT: ${body}"
