# devservices-compose.yaml (included in project)
services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: camel
      MONGO_INITDB_ROOT_PASSWORD: camel123

  activemq:           # IBM MQ compatible for local dev
    image: apache/activemq-artemis:latest
    ports: ["61616:61616", "8161:8161"]

  kafka:
    image: confluentinc/cp-kafka:latest
    ports: ["9092:9092"]

  mongo-express:      # MongoDB UI
    image: mongo-express:latest
    ports: ["8081:8081"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: camel
      ME_CONFIG_MONGODB_ADMINPASSWORD: camel123
      ME_CONFIG_MONGODB_URL: mongodb://camel:camel123@mongodb:27017/
