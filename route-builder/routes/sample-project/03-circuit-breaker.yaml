# ID: rest-client-circuit-breaker
# ENABLED: true
# DESCRIPTION: Uses a Circuit Breaker to safely consume an external REST service and provides a fallback cached response.
- route:
    id: "rest-client-circuit-breaker"
    from:
      uri: "direct:call-external-api"
      steps:
        - log: "Preparing to call external REST API..."
        - circuitBreaker:
            steps:
              - to: "http://api.external-service.com/data?throwExceptionOnFailure=false"
              - log: "Successfully fetched data: ${body}"
            onFallback:
              steps:
                - log: "External API failed, falling back to cached response."
                - transform:
                    constant: "{ \"data\": \"fallback_cached_data\", \"status\": \"degraded\" }"
