# ID: rest-api-demo
# ENABLED: true
# DESCRIPTION: Demonstrates exposing HTTP REST endpoints using Camel REST DSL, accepting POST JSON and GET requests.
- rest:
    path: "/api/v1"
    post:
      - path: "/orders"
        consumes: "application/json"
        produces: "application/json"
        to: "direct:process-order"
    get:
      - path: "/orders/{id}"
        produces: "application/json"
        to: "direct:fetch-order"

- route:
    id: "process-order-route"
    from:
      uri: "direct:process-order"
      steps:
        - log: "Received new order: ${body}"
        - setBody:
            constant: "{ \"status\": \"Order Accepted\" }"
