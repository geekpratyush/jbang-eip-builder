- route:
    id: "complex-financial-transaction1"
    from:
      uri: "timer:trigger"
      steps:
        - log:
            message: "Starting complex transaction..."
        - setBody:
            constant: "{ 'transactionId': 'TXN-9988' }"
        - doTry:
            steps:
              - log:
                  message: "Validating payload..."
              - choice:
                  when:
                    - simple: "${body} contains 'TXN'"
                      steps:
                        - setHeader:
                            name: "Validation"
                            constant: "PASSED"
                  otherwise:
                    steps:
                      - to: "mock:dead-letter"
              - log:
                  message: "Validation successful, broadcasting parallelly..."
              - multicast:
                  steps:
                    - to: "kafka:transactions-topic"
                    - to: "mongodb:myDb?database=financial"
                    - to: "ibmmq:queue:TXN.PROCESSING.QUEUE"
            doCatch:
              - exception:
                  - "java.lang.Exception"
                steps:
                  - log:
                      message: "Error processing transaction: ${exception.message}"
                  - to: "mock:error-handler"
            doFinally:
              steps:
                - log:
                    message: "Transaction processing finished."
