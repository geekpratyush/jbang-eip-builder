# DATABASE ROW SHAPING & CRYPTO PATTERN
# Goal: Shape DB rows, use Global Crypto Key, and show local Key Override.
# camel-k: dependency=mvn:com.sre.engine:sre-audit-crypto:1.0.0-SNAPSHOT

- beans:
    - name: "auditProcessor"
      type: "com.sre.engine.audit.AuditShaperProcessor"

- route:
    id: "db-row-crypto-demo"
    from:
      uri: "timer:db-test?repeatCount=1"
      steps:
        # 1. Simulate a flat SQL Result
        - setBody:
            constant: '{"usr_id": "U123", "usr_pass": "p@ssword123", "secret_token": "TKN-999"}'
        
        # 2. Global Key Configuration (Usually in application.properties)
        # For JBang demo, we use a simple setProperty or ENV
        - setProperty:
            name: "sre.audit.crypto.key"
            constant: "GLOBAL_SECURE_KEY"
            
        # 3. Shape: Delete password from logs (Auto-masking will catch it anyway)
        #    Encrypt token using the GLOBAL key
        - setHeader:
            name: "CamelAuditEncryptFields"
            constant: "$.secret_token"
        - process:
            ref: "auditProcessor"
        - log: "RESULT (GLOBAL KEY): ${body}"
        
        # 4. Local Key Override (Specific high-security case)
        - setBody:
            constant: '{"usr_id": "U123", "usr_pass": "p@ssword123", "secret_token": "TKN-999"}'
        - setHeader:
            name: "CamelAuditCryptoKey"
            constant: "LOCAL_SENSITIVE_KEY"
        - setHeader:
            name: "CamelAuditEncryptFields"
            constant: "$.secret_token"
        - process:
            ref: "auditProcessor"
        - log: "RESULT (LOCAL OVERRIDE): ${body}"
        
        # 5. Debug Mode (Force showing sensitive fields)
        - setBody:
            constant: '{"usr_pass": "p@ssword123"}'
        - setHeader:
            name: "CamelAuditDebugLog"
            constant: "true"
        - process:
            ref: "auditProcessor"
        - log: "RESULT (DEBUG MODE - NO MASKING): ${body}"
