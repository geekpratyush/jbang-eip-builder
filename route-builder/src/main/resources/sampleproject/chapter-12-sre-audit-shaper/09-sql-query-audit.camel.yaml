# SQL DB QUERY AUDIT PATTERN
# Goal: Simulate fetching flat SQL rows, shaping into JSON, and auditing.
# camel-k: dependency=mvn:com.sre.engine:sre-audit-crypto:1.0.0-SNAPSHOT

- beans:
    - name: "auditProcessor"
      type: "com.sre.engine.audit.AuditShaperProcessor"

- route:
    id: "sql-query-and-audit"
    from:
      uri: "timer:sql-query?repeatCount=1"
      steps:
        # 1. SIMULATE SQL RESULT (List of Rows)
        # SQL results are usually flat columns.
        - setBody:
            constant: |
              {
                "TX_ID": "SQL-001",
                "CUST_NAME": "Pratyush",
                "CARD_MASK": "4111-XXXX-XXXX-1111",
                "INTERNAL_DB_ID": 55921,
                "SECRET_PIN": "1234"
              }
        
        # 2. SHAPE & ENCRYPT
        # - Exclude the internal DB identifier
        # - Encrypt the PIN for the audit log
        # - Rename fields to canonical SRE names
        - setHeader:
            name: "CamelAuditExcludeFields"
            constant: "$.INTERNAL_DB_ID"
        - setHeader:
            name: "CamelAuditEncryptFields"
            constant: "$.SECRET_PIN"
        - setHeader:
            name: "CamelAuditModifyFields"
            constant: "$.transactionId=$.TX_ID,$.customer=$.CUST_NAME"
        - setHeader:
            name: "CamelAuditPrettyPrint"
            constant: "true"
        - process:
            ref: "auditProcessor"
        
        # 3. FORWARD TO NEXT LEVEL
        - to: "direct:business-logic-engine"

- route:
    id: "business-logic-engine"
    from:
      uri: "direct:business-logic-engine"
      steps:
        - log: "BUSINESS ENGINE RECEIVED SHAPED SQL DATA:\n${body}"
