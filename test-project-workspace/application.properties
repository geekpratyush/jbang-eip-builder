# Chapter 6: REST APIs
rest.products.uri=stub:http:api.example.com/api/v1/products

# Chapter 7: Enterprise Patterns
saga.hotel.uri=stub:direct:book-hotel
saga.flight.uri=stub:direct:book-flight
saga.payment.uri=stub:direct:charge-payment
outbox.kafka.uri=stub:kafka:topic:OUTBOX.EVENTS
dlc.dlq.uri=stub:jms:queue:DLQ
dlc.main.uri=stub:jms:queue:MAIN.QUEUE

# Chapter 8: REST Gateway
gateway.downstream.uri=stub:http:downstream-service

# Chapter 9: Cryptography & Auditing
audit.mongodb.uri=stub:mongodb:myDb?consumerType=changeStream&database=audit&collection=transactions
xa.request.uri=stub:jms:queue:XA.REQUEST?cacheLevelName=CACHE_NONE&transacted=false

# Log Management & DevServices Control
# Disable automatic MongoDB container startup (DevServices)
quarkus.mongodb.devservices.enabled=false

# Suppress verbose MongoDB driver logs
quarkus.log.category."org.mongodb.driver".level=WARN
# General Quarkus log level
quarkus.log.level=INFO
