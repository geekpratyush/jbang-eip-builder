# MONGO DB QUERY AUDIT PATTERN
# Goal: Simulate fetching a complex document and auditing it before passing to a Service Layer.
# camel-k: dependency=mvn:com.tessera:sre-audit-crypto:1.0.0-SNAPSHOT

- beans:
    - name: "auditProcessor"
      type: "com.tessera.audit.AuditShaperProcessor"

- route:
    id: "mongo-query-and-audit"
    from:
      uri: "timer:mongo-query?repeatCount=1"
      steps:
        # 1. SIMULATE MONGO QUERY RESULT
        # A typical Mongo document often has nested objects and sensitive keys.
        - setBody:
            constant: |
              {
                "_id": {"$oid": "60b8d545e3592a29c8"},
                "username": "sre_admin",
                "profile": {
                  "email": "admin@sre.com",
                  "apikey": "PROD-SECRET-KEY-999"
                },
                "lastLogin": "2026-05-30T10:00:00Z"
              }
        
        # 2. AUDIT & SECURE
        # - Mask the apikey (Safe Masking will catch it, but let's be explicit)
        # - Pretty print for visibility
        - setHeader:
            name: "CamelAuditPrettyPrint"
            constant: "true"
        - setHeader:
            name: "CamelAuditExcludeFields"
            constant: "$._id"
        - process:
            ref: "auditProcessor"
        
        # 3. FORWARD TO NEXT LEVEL
        # The 'Next Level' receives a clean, canonical audit record.
        - to: "direct:service-layer-logic"

- route:
    id: "next-level-consumer"
    from:
      uri: "direct:service-layer-logic"
      steps:
        - log: "SERVICE LAYER RECEIVED AUDITED DATA:\n${body}"
