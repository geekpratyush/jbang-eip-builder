# camel-k: dependency=mvn:com.tessera:tessera-faker:1.0.0-SNAPSHOT
- beans:
    - name: "myFaker"
      type: "com.tessera.faker.UniversalFaker"
      properties:
        templatesDir: "{{FAKER_TEMPLATES_DIR}}"
        dbDir: "{{FAKER_DB_DIR}}"
- route:
    id: "faker-demo"
    from:
      uri: "timer:faker?period=3000"
      steps:
        - setBody:
            constant: "mt103"
        - bean:
            ref: "myFaker"
            method: "generate(${body})"
        - log: "Generated Message:\n${body}"
