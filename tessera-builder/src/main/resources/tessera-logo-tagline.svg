<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <!-- Soft background spotlight effect -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#EFF2F5" />
    </radialGradient>

    <!-- Split-tone lighting gradients representing the sharp vertical center -->
    <linearGradient id="topBlueGrad" x1="-50" y1="50" x2="50" y2="-50" gradientUnits="userSpaceOnUse">
      <stop offset="49.8%" stop-color="#3A8DB5" />
      <stop offset="50.2%" stop-color="#64ACD0" />
    </linearGradient>
    
    <linearGradient id="bottomDarkGrad" x1="-50" y1="50" x2="50" y2="-50" gradientUnits="userSpaceOnUse">
      <stop offset="49.8%" stop-color="#0E505E" />
      <stop offset="50.2%" stop-color="#176E7D" />
    </linearGradient>

    <!-- Drop shadow for the interlocking 3D depth -->
    <filter id="pieceShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#002233" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGlow)" />

  <!-- Master Logo Group: Scaled and Centered -->
  <g transform="translate(500, 190) scale(1.2)">
    
    <!-- Base Triangles (Rendered first so they sit underneath) -->
    <g stroke-width="12" stroke-linejoin="round">
      <path d="M -120 45 L -55 110 L -185 110 Z" fill="#136070" stroke="#136070" />
      <path d="M 120 45 L 185 110 L 55 110 Z" fill="#207886" stroke="#207886" />
    </g>

    <!-- Diamond Puzzle Pieces (Rotated 45 degrees, ordered from bottom to top for shadow layering) -->
    <g transform="rotate(45)" stroke-linejoin="round">
      
      <!-- 1. Bottom Right Piece (Visual Bottom Dark Teal) -->
      <path d="M 100 100 L 4 100 L 4 62 L -2 62 C -6 72, -20 68, -20 50 C -20 32, -6 28, -2 38 L 4 38 L 4 4 L 38 4 L 38 -2 C 28 -6, 32 -20, 50 -20 C 68 -20, 72 -6, 62 -2 L 62 4 L 100 4 Z" 
            fill="url(#bottomDarkGrad)" filter="url(#pieceShadow)" />
      
      <!-- 2. Bottom Left Piece (Visual Left Teal) -->
      <path d="M -100 100 L -100 4 L -62 4 L -62 -2 C -72 -6, -68 -20, -50 -20 C -32 -20, -28 -6, -38 -2 L -38 4 L -4 4 L -4 38 L -10 38 C -14 28, -28 32, -28 50 C -28 68, -14 72, -10 62 L -4 62 L -4 100 Z" 
            fill="#136070" filter="url(#pieceShadow)" />

      <!-- 3. Top Right Piece (Visual Right Peach) -->
      <path d="M 100 -100 L 100 -4 L 62 -4 L 62 -10 C 72 -14, 68 -28, 50 -28 C 32 -28, 28 -14, 38 -10 L 38 -4 L 4 -4 L 4 -38 L -2 -38 C -6 -28, -20 -32, -20 -50 C -20 -68, -6 -72, -2 -62 L 4 -62 L 4 -100 Z" 
            fill="#F1A463" filter="url(#pieceShadow)" />

      <!-- 4. Top Left Piece (Visual Top Blue - Renders on top of everything) -->
      <path d="M -100 -100 L -4 -100 L -4 -62 L -10 -62 C -14 -72, -28 -68, -28 -50 C -28 -32, -14 -28, -10 -38 L -4 -38 L -4 -4 L -38 -4 L -38 -10 C -28 -14, -32 -28, -50 -28 C -68 -28, -72 -14, -62 -10 L -62 -4 L -100 -4 Z" 
            fill="url(#topBlueGrad)" filter="url(#pieceShadow)" />
            
    </g>
  </g>

  <!-- Typography -->
  <text x="500" y="480" font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif" font-weight="900" font-size="82" fill="#333333" text-anchor="middle" letter-spacing="6">
    TESSERA
  </text>
  
  <text x="500" y="535" font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif" font-weight="400" font-size="26" fill="#4B555A" text-anchor="middle" letter-spacing="0.5">
    The foundational tiles of enterprise architecture
  </text>

</svg>